# image.tag only changes through a merged promote PR (.github/workflows/promote.yml).
image:
  tag: "14f05a1a285bb95fb3bd917077a9e62062130f1d" # set by promote PR

env:
  - name: GO_ENV
    value: production
  - name: BACKEND_URL
    value: http://api:8080 # same-namespace service
  - name: PUBLIC_BASE_URL
    # Must match OAUTH_ALLOWED_REDIRECT_URIS (www callbacks). Apex norviq.org is not allowlisted.
    value: https://www.norviq.org
  - name: COOKIE_SECURE
    value: "true"
  - name: SENTRY_ENVIRONMENT
    value: production

resources:
  requests:
    cpu: 50m
    memory: 48Mi
  limits:
    memory: 96Mi

ingress:
  hosts:
    - norviq.org
    - www.norviq.org
