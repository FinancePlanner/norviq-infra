image:
  repository: ghcr.io/financeplanner/norviq-backend

port: 8080
envFromSecret: api-env
# Shared with norviq-mcp: the backend validates introspection calls against this.
envFromSecrets:
  - mcp-introspection
  - report-download-signing

env:
  - name: TAX_REPORT_STORAGE_PATH
    value: /var/lib/norviq/tax-reports
  - name: ADVANCED_REPORT_STORAGE_PATH
    value: /var/lib/norviq/advanced-reports
  - name: GOTENBERG_BASE_URL
    value: http://gotenberg:3000

persistence:
  enabled: true
  mountPath: /var/lib/norviq/tax-reports
  size: 1Gi

additionalPersistence:
  - name: advanced-reports
    mountPath: /var/lib/norviq/advanced-reports
    size: 2Gi
    accessModes:
      - ReadWriteOnce

probes:
  readiness:
    path: /health/ready
    initialDelaySeconds: 5
    periodSeconds: 10
    failureThreshold: 6
  liveness:
    path: /health/live
    initialDelaySeconds: 15
    periodSeconds: 20
    failureThreshold: 3

podAnnotations:
  prometheus.io/scrape: "true"
  prometheus.io/port: "8080"
  prometheus.io/path: /metrics

migrate:
  enabled: true
  args: ["migrate", "--yes"]

ingress:
  clusterIssuer: letsencrypt-prod
