# image.tag is bumped automatically by FinanceBackend CI on merge to main.
image:
  tag: "5f209b4c7b35ba7f7cee8efd0ede329c133588b7" # set by CI: <git-sha>
env:
  - name: DATABASE_HOST
    value: postgres.data.svc.cluster.local
  - name: DATABASE_PORT
    value: "5432"
  - name: DATABASE_NAME
    value: stockplan_staging
  - name: LOG_LEVEL
    value: debug
  - name: LOG_FORMAT
    value: json
  - name: PROMETHEUS_ENABLED
    value: "true"
  - name: OBS_TRACES_ENABLED
    value: "true"
  - name: OBS_OTLP_ENDPOINT
    value: http://alloy.observability.svc.cluster.local:4317
  - name: TAX_REPORT_STORAGE_PATH
    value: /var/lib/norviq/tax-reports
  - name: ADVANCED_REPORT_STORAGE_PATH
    value: /var/lib/norviq/advanced-reports
  - name: GOTENBERG_BASE_URL
    value: http://gotenberg:3000
  - name: TAX_VALIDATED_JURISDICTIONS
    value: US
  - name: PUBLIC_API_BASE_URL
    value: https://dev-api.norviq.org
  - name: REBALANCING_ENABLED
    value: "true"
  - name: REBALANCING_ALERTS_ENABLED
    value: "true"
  - name: REBALANCING_ALERT_POLL_SECONDS
    value: "300"

persistence:
  enabled: true
  mountPath: /var/lib/norviq/tax-reports
  size: 1Gi
additionalPersistence:
  - name: advanced-reports
    mountPath: /var/lib/norviq/advanced-reports
    size: 2Gi
    accessModes:
      - ReadWriteOnce
resources:
  requests:
    cpu: 50m
    memory: 128Mi
  limits:
    memory: 256Mi
ingress:
  hosts:
    - dev-api.norviq.org
