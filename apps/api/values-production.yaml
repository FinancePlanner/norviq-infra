# image.tag only changes through a merged promote PR (.github/workflows/promote.yml).
image:
  tag: "5f209b4c7b35ba7f7cee8efd0ede329c133588b7"  # bootstrap k3s production cutover

env:
  - name: DATABASE_HOST
    value: postgres.data.svc.cluster.local
  - name: DATABASE_PORT
    value: "5432"
  - name: DATABASE_NAME
    value: stockplan_production
  - name: LOG_LEVEL
    value: info
  - name: LOG_FORMAT
    value: json
  - name: PROMETHEUS_ENABLED
    value: "true"
  - name: OBS_TRACES_ENABLED
    value: "true"
  - name: OBS_OTLP_ENDPOINT
    value: http://alloy.observability.svc.cluster.local:4317
  - name: TAX_REPORT_STORAGE_PATH
    value: /var/lib/norviq/tax-reports
  - name: ADVANCED_REPORT_STORAGE_PATH
    value: /var/lib/norviq/advanced-reports
  - name: GOTENBERG_BASE_URL
    value: http://gotenberg:3000
  - name: TAX_VALIDATED_JURISDICTIONS
    value: US
  - name: PUBLIC_API_BASE_URL
    value: https://api.norviq.org
  - name: REBALANCING_ENABLED
    value: "true"
  - name: REBALANCING_ALERTS_ENABLED
    value: "true"
  - name: REBALANCING_ALERT_POLL_SECONDS
    value: "300"
  - name: GOAL_PLANNING_ENABLED
    value: "true"
  - name: GOAL_EVALUATOR_ENABLED
    value: "true"
  - name: GOAL_EVALUATOR_INTERVAL_SECONDS
    value: "86400"

persistence:
  enabled: true
  mountPath: /var/lib/norviq/tax-reports
  size: 5Gi

additionalPersistence:
  - name: advanced-reports
    mountPath: /var/lib/norviq/advanced-reports
    size: 10Gi
    accessModes:
      - ReadWriteOnce

resources:
  requests:
    cpu: 200m
    memory: 256Mi
  limits:
    memory: 450Mi

ingress:
  hosts:
    - api.norviq.org
