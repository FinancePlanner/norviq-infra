# image.tag only changes through a merged promote PR (.github/workflows/promote.yml).
image:
  tag: "" # set by promote PR

env:
  - name: DATABASE_HOST
    value: postgres.data.svc.cluster.local
  - name: DATABASE_PORT
    value: "5432"
  - name: DATABASE_NAME
    value: stockplan_production
  - name: LOG_LEVEL
    value: info
  - name: LOG_FORMAT
    value: json
  - name: PROMETHEUS_ENABLED
    value: "true"
  - name: OBS_TRACES_ENABLED
    value: "true"
  - name: OBS_OTLP_ENDPOINT
    value: http://alloy.observability.svc.cluster.local:4317
  - name: TAX_REPORT_STORAGE_PATH
    value: /var/lib/norviq/tax-reports
  - name: TAX_VALIDATED_JURISDICTIONS
    value: US

persistence:
  enabled: true
  mountPath: /var/lib/norviq/tax-reports
  size: 5Gi

resources:
  requests:
    cpu: 200m
    memory: 256Mi
  limits:
    memory: 450Mi

ingress:
  hosts:
    - api.norviq.org
