apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: secrets
  namespace: argocd
spec:
  project: default
  source:
    repoURL: https://github.com/FinancePlanner/norviq-infra.git
    targetRevision: main
    path: secrets
    directory:
      recurse: true
      exclude: "{*.example.yaml,**/*.example.yaml,README.md}"
  destination:
    server: https://kubernetes.default.svc
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    retry:
      limit: 10
      backoff:
        duration: 30s
        factor: 2
        maxDuration: 5m
