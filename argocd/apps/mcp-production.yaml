apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: mcp-production
  namespace: argocd
spec:
  project: default
  source:
    repoURL: https://github.com/FinancePlanner/norviq-infra.git
    targetRevision: main
    path: charts/app
    helm:
      releaseName: mcp
      valueFiles:
        - ../../apps/mcp/values-common.yaml
        - ../../apps/mcp/values-production.yaml
  destination:
    server: https://kubernetes.default.svc
    namespace: production
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    retry:
      limit: 5
      backoff:
        duration: 30s
        factor: 2
        maxDuration: 5m
