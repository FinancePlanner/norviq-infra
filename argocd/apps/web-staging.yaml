apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: web-staging
  namespace: argocd
spec:
  project: default
  source:
    repoURL: https://github.com/FinancePlanner/norviq-infra.git
    targetRevision: main
    path: charts/app
    helm:
      releaseName: web
      valueFiles:
        - ../../apps/web/values-common.yaml
        - ../../apps/web/values-staging.yaml
  destination:
    server: https://kubernetes.default.svc
    namespace: staging
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    retry:
      limit: 5
      backoff:
        duration: 30s
        factor: 2
        maxDuration: 5m
