# Replace with real sealed output — see secrets/README.md.
# The MCP_INTROSPECTION_SECRET value MUST match the same key added to api-env
# (the backend validates introspection calls against it).
#
# echo "MCP_INTROSPECTION_SECRET=<shared-secret>" > .env.mcp
# kubectl create secret generic mcp-env -n production --from-env-file=.env.mcp \
#   --dry-run=client -o yaml \
#   | kubeseal --controller-name sealed-secrets-controller \
#              --controller-namespace kube-system -o yaml \
#   > secrets/production/mcp-env.yaml
apiVersion: bitnami.com/v1alpha1
kind: SealedSecret
metadata:
  name: mcp-env
  namespace: production
spec:
  encryptedData:
    MCP_INTROSPECTION_SECRET: AgB...
  template:
    metadata:
      name: mcp-env
      namespace: production
