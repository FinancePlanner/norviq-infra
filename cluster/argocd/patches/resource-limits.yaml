apiVersion: apps/v1
kind: StatefulSet
metadata:
  name: argocd-application-controller
spec:
  template:
    spec:
      containers:
        - name: argocd-application-controller
          resources:
            requests:
              cpu: 100m
              memory: 320Mi
            limits:
              # 320Mi OOMKills the controller once it manages ~12 apps.
              memory: 640Mi
