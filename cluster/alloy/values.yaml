# grafana/alloy helm chart values.
# Everything (metrics + logs + traces) is pushed through Grafana Cloud's single
# OTLP gateway. Credentials come from the SealedSecret `grafana-cloud`
# (namespace observability) with keys:
#   GC_OTLP_ENDPOINT  e.g. https://otlp-gateway-prod-eu-west-6.grafana.net/otlp
#   GC_INSTANCE_ID    numeric instance ID (basic-auth username)
#   GC_TOKEN          Access Policy token (basic-auth password)
# Series budget is 10k on the free tier: kube-state-metrics is intentionally
# absent and cAdvisor is trimmed to a whitelist below.

controller:
  type: deployment
  replicas: 1

alloy:
  resources:
    requests:
      cpu: 50m
      memory: 160Mi
    limits:
      memory: 300Mi

  extraPorts:
    - name: otlp-grpc
      port: 4317
      targetPort: 4317
      protocol: TCP

  envFrom:
    - secretRef:
        name: grafana-cloud

  configMap:
    content: |-
      // ================= Grafana Cloud OTLP gateway (all signals) =============
      otelcol.auth.basic "gc" {
        username = sys.env("GC_INSTANCE_ID")
        password = sys.env("GC_TOKEN")
      }

      otelcol.exporter.otlphttp "gc" {
        client {
          endpoint = sys.env("GC_OTLP_ENDPOINT")
          auth     = otelcol.auth.basic.gc.handler
        }
      }

      otelcol.processor.batch "default" {
        output {
          metrics = [otelcol.exporter.otlphttp.gc.input]
          logs    = [otelcol.exporter.otlphttp.gc.input]
          traces  = [otelcol.exporter.otlphttp.gc.input]
        }
      }

      // ---------- Traces: OTLP in (swift-otel) ----------
      otelcol.receiver.otlp "in" {
        grpc { endpoint = "0.0.0.0:4317" }
        output {
          traces = [otelcol.processor.batch.default.input]
        }
      }

      // ---------- Metrics: prometheus scrapes -> OTLP ----------
      otelcol.receiver.prometheus "in" {
        output {
          metrics = [otelcol.processor.batch.default.input]
        }
      }

      discovery.kubernetes "pods" {
        role = "pod"
      }

      // App /metrics (pods annotated prometheus.io/scrape: "true")
      discovery.relabel "scrape_pods" {
        targets = discovery.kubernetes.pods.targets
        rule {
          source_labels = ["__meta_kubernetes_pod_annotation_prometheus_io_scrape"]
          regex         = "true"
          action        = "keep"
        }
        rule {
          source_labels = ["__meta_kubernetes_pod_annotation_prometheus_io_path"]
          regex         = "(.+)"
          target_label  = "__metrics_path__"
        }
        rule {
          source_labels = ["__address__", "__meta_kubernetes_pod_annotation_prometheus_io_port"]
          regex         = "([^:]+)(?::\\d+)?;(\\d+)"
          replacement   = "$1:$2"
          target_label  = "__address__"
        }
        rule {
          source_labels = ["__meta_kubernetes_namespace"]
          target_label  = "namespace"
        }
        rule {
          source_labels = ["__meta_kubernetes_pod_label_app_kubernetes_io_name"]
          target_label  = "app"
        }
      }

      prometheus.scrape "pods" {
        targets         = discovery.relabel.scrape_pods.output
        scrape_interval = "60s"
        forward_to      = [otelcol.receiver.prometheus.in.receiver]
      }

      // cAdvisor via kubelet, trimmed to what matters on one node.
      discovery.kubernetes "nodes" {
        role = "node"
      }

      prometheus.scrape "cadvisor" {
        targets           = discovery.kubernetes.nodes.targets
        scheme            = "https"
        metrics_path      = "/metrics/cadvisor"
        scrape_interval   = "60s"
        bearer_token_file = "/var/run/secrets/kubernetes.io/serviceaccount/token"
        tls_config {
          insecure_skip_verify = true
        }
        forward_to = [prometheus.relabel.cadvisor_trim.receiver]
      }

      prometheus.relabel "cadvisor_trim" {
        rule {
          source_labels = ["__name__"]
          regex         = "container_memory_working_set_bytes|container_cpu_usage_seconds_total|container_network_receive_bytes_total|container_network_transmit_bytes_total"
          action        = "keep"
        }
        rule {
          source_labels = ["container"]
          regex         = "^$|POD"
          action        = "drop"
        }
        forward_to = [otelcol.receiver.prometheus.in.receiver]
      }

      // Host metrics (node_exporter equivalent, built in).
      prometheus.exporter.unix "host" {
        set_collectors = ["cpu", "meminfo", "diskstats", "filesystem", "loadavg", "netdev"]
      }

      prometheus.scrape "host" {
        targets         = prometheus.exporter.unix.host.targets
        scrape_interval = "60s"
        forward_to      = [otelcol.receiver.prometheus.in.receiver]
      }

      // ---------- Logs: pod stdout/stderr -> OTLP ----------
      otelcol.receiver.loki "in" {
        output {
          logs = [otelcol.processor.batch.default.input]
        }
      }

      discovery.relabel "pod_logs" {
        targets = discovery.kubernetes.pods.targets
        rule {
          source_labels = ["__meta_kubernetes_namespace"]
          target_label  = "namespace"
        }
        rule {
          source_labels = ["__meta_kubernetes_pod_name"]
          target_label  = "pod"
        }
        rule {
          source_labels = ["__meta_kubernetes_pod_container_name"]
          target_label  = "container"
        }
        rule {
          source_labels = ["__meta_kubernetes_pod_label_app_kubernetes_io_name"]
          target_label  = "app"
        }
      }

      loki.source.kubernetes "pods" {
        targets    = discovery.relabel.pod_logs.output
        forward_to = [otelcol.receiver.loki.in.receiver]
      }

rbac:
  create: true

serviceAccount:
  create: true
